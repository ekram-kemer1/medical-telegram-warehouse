version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: telegram_warehouse_db
    environment:
      POSTGRES_DB: telegram_warehouse
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: