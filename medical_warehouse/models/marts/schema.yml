version: 2

models:
  - name: dim_channels
    description: "One row per Telegram channel with metadata"
    columns:
      - name: channel_key
        description: "MD5 surrogate primary key"
        tests: [unique, not_null]
      - name: channel_name
        tests: [not_null]

  - name: dim_dates
    description: "Date dimension with calendar attributes"
    columns:
      - name: date_key
        description: "Integer date key YYYYMMDD"
        tests: [unique, not_null]
      - name: full_date
        tests: [not_null]

  - name: fct_messages
    description: "Fact table - one row per Telegram message"
    columns:
      - name: message_id
        description: "Primary key"
        tests: [unique, not_null]
      - name: channel_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key